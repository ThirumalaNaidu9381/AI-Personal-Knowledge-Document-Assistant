services:
  backend:
    build: .
    container_name: ai-backend
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
    environment:
      - GOOGLE_API_KEY=AIzaSyD8j7QQG9KJGsIWaaiBaehhqmzsJKkSNKk
      
  celery:
    build: .
    container_name: ai-celery
    command: celery -A app.queue.celery_app.celery_app worker -Q default --loglevel=info
    depends_on:
      - redis
    environment:
      - GOOGLE_API_KEY=AIzaSyD8j7QQG9KJGsIWaaiBaehhqmzsJKkSNKk

  redis:
    image: redis:7
    container_name: ai-redis
    ports:
      - "6379:6379"